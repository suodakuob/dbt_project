version: 2

models:
  - name: stg_jaffle_shop__customers
    description: "Données nettoyées des clients provenant de l'application Jaffle Shop."
    columns:
      - name: customer_id
        description: "Clé primaire unique pour chaque client."
        data_tests:
          - unique
          - not_null

  - name: stg_jaffle_shop__orders
    description: "Données nettoyées des commandes. Chaque ligne est une commande unique."
    columns:
      - name: order_id
        description: "Clé primaire unique de la commande."
        data_tests:
          - unique
          - not_null
      - name: order_status
        description: "{{ doc('order_status') }}" # On appelle le bloc Markdown ici
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']
      - name: customer_id
        description: "Lien vers la table des clients."
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id